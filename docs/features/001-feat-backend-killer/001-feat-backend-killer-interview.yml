conversation_history:
  - question_num: 1
    timestamp: "2026-06-21 10:20:42"
    topic: "memory_mechanism / panel observability / testing / pre-seeding / concurrency"
    agent_question: |
      (1) Mechanism conflicts with the escalation panel. A single blocking array_agg
      (variant A) is opaque — no live volume/rate. Options: (A) one opaque query,
      (B) incremental growth in one session (prepared-statement/plan-cache leak or growing
      allocations) — honest live panel, real production incident, recommended,
      (C) many sessions. (2) Testing: can't really OOM in CI; assert incremental growth +
      clean ctx stop, leave real OOM for manual stand demo. (3) Pre-seeding not needed with
      B; single-threaded vs --jobs?
    user_answer: |
      (1) Variant B. (2) Agreed. (3) Confirmed no pre-seeding, single-threaded implementation.
    summary: "B (incremental single-session growth), test mechanics not catastrophe, no pre-seed, single-threaded."
  - question_num: 2
    timestamp: "2026-06-21 10:24:08"
    topic: "concrete B mechanism / self-report metric / climax"
    agent_question: |
      (1) Concrete B = prepared-statement / plan-cache leak: one session issues many unique
      PREPAREs (heavy plans) so backend plan cache grows monotonically; recognizable incident
      (ORM/pooler without DEALLOCATE). Alternative held-cursors spill to disk via tuplestore →
      less pure RAM pressure. (2) Self-report metric = "prepared stmts: N ▲ rate/s · uptime"
      (noisia knows the count exactly; no RSS polling). (3) Climax: noisia catches the loss of
      its OWN connection and logs "connection lost after <uptime>, ~N statements — instance
      likely OOM-restarted".
    user_answer: |
      (1) Confirmed prepared-statement leak. (2) Yes, sufficient. (3) Yes, take it.
    summary: "Mechanism = prepared-statement/plan-cache leak; metric = stmt count+rate+uptime; climax = own-connection-lost detection."
  - question_num: 3
    timestamp: "2026-06-21 10:29:25"
    topic: "user stories / panel format & cadence / tuning flags"
    agent_question: |
      (1) Proposed US1 (lead DBA demoing OOM-from-one-session) + US2 (SRE validating alerts);
      third needed? (2) Panel format "backend-killer: prepared stmts=N rate=R/s elapsed=T" +
      final "connection lost after T, N statements issued — target likely OOM-restarted";
      cadence fixed 1s or flag? (3) Flags: --backend-killer.rate; add --backend-killer.plan-size
      (plan heaviness) so OOM is reached faster/predictably on big-RAM stands?
    user_answer: |
      (1) Two stories are enough. (2) Format ok; make cadence a flag, default 1s.
      (3) rate default = unlimited; add plan-size.
    summary: "2 user stories; report-interval flag (default 1s); flags = enable + rate(0=unlimited) + plan-size + report-interval."
  - question_num: 4
    timestamp: "2026-06-21 10:47:38"
    topic: "devil's advocate resolution: value / show-memory / plan-size predictability"
    agent_question: |
      dev-customer raised 3 MAJOR concerns: (1) prepared-stmt leak is a niche OOM path / weak first
      lesson; was it a real incident? (2) self-report hides the *effect* (RSS) — add memory side?
      (3) OOM timing unpredictable across stands; plan-size undefined.
    user_answer: |
      (1) Disagrees with "work_mem→OOM is typical" — work_mem usually causes disk spill + IO, rarely
      OOM. The prepared-stmt leak scenario is THEORETICAL (never hit it personally), BUT RSS growth →
      OOM is something they have seen many times. Keep the mechanism.
      (2) OK, add the hybrid memory panel (counter always + optional pg_backend_memory_contexts line).
      (3) Likes auto plan-size: detect available memory via procfs and pick plan-size dynamically,
      expose a multiplier flag. Agreed to the cgroup-aware + co-location caveats and the flag scheme.
    summary: "Mechanism kept (valid RSS->OOM path, plan-cache leak is realistic though theoretical). Add show-memory hybrid. Auto plan-size (cgroup->meminfo) + size-multiplier; plan-size=0=auto, >0=override."
  - question_num: 5
    timestamp: "2026-06-21 10:55:00"
    topic: "validation round 1 — adequacy major: drop auto plan-size"
    agent_question: |
      Adequacy validator (approved, no critical) flagged auto plan-size via procfs/cgroup as
      overengineering for v1: brittle net-new platform code, only a heuristic, only valid co-located,
      unreliable in containers, while --plan-size override already exists. Options: (A) drop auto in v1
      (recommended), (B) keep, (C) narrow to cgroup v2 only.
    user_answer: |
      Drop auto-detect entirely, not even into the backlog — it's genuinely brittle, the profit is
      unclear, and the existing flags are enough to regulate the load.
    summary: "Auto plan-size removed entirely. Also dropped size-multiplier (orphaned). Final flags: enable + rate + plan-size + show-memory + report-interval."

# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
phase1_feature_overview:

  feature_description:
    score: 95
    status: "complete"
    value: |
      backend-killer: a new noisia workload generator. A SINGLE session incrementally
      inflates its backend's memory (variant B) under client-controlled pacing — so the
      backend RSS climbs monotonically and observably until the OOM killer reaps it. The
      postmaster treats an OOM-killed child as a crash and restarts the whole instance —
      demonstrating "one session took down the database". Single-threaded (no --jobs),
      no pre-seeding (self-generated load). Concrete mechanism CONFIRMED: prepared-statement /
      plan-cache leak — one session issues many unique PREPARE statements (heavy plans) so the
      backend's plan cache grows without bound. Recognizable production incident (ORM/driver/
      pooler that never DEALLOCATEs).
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      Teaching material for senior DBAs training juniors: build a stand, generate load,
      demonstrate how PostgreSQL behaves under extreme memory pressure (OOM), point out
      symptoms and remediation. The OOM-via-one-backend failure mode is non-obvious and a
      classic production incident. Primary use is teaching; monitoring-alert validation is a
      secondary use.
    gaps: ""
    required: true

  target_users:
    score: 85
    status: "complete"
    value: "Senior DBAs (as trainers), juniors (as audience); also SRE/perf engineers validating monitoring."
    gaps: ""
    required: false

  success_criteria:
    score: 85
    status: "complete"
    value: |
      - The workload runs as a standard noisia workload (CLI flag + library) and is wired in.
      - Against a small-memory stand it drives the target backend to OOM, and the postmaster
        restarts the instance ("one session took down the database").
      - During the run an escalation panel reports prepared-stmt count + rate + elapsed at the
        configured interval (self-report only, no PG state polling).
      - On OOM, noisia detects the loss of its own connection and logs the climax line.
      - In CI/integration tests the mechanics are proven (monotonic counter growth + clean ctx
        stop) WITHOUT driving a real OOM.
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      Must follow existing noisia workload conventions: own Go package, Config + validate(),
      NewWorkload, Run(ctx), pgx v5 via db interfaces, context as only stop mechanism,
      Conninfo never logged, CLI wiring in cmd/ (kingpin/v2). Self-report primary (PREPARE
      counter survives crash); the only server query allowed is the OPTIONAL own-backend memory
      read under --show-memory. Escalation-panel output, no percent bar.
    gaps: ""
    required: true

  testing_strategy:
    score: 85
    status: "complete"
    value: |
      Test the mechanics, not the catastrophe. Under testcontainers (integration), assert:
      the session opens, the chosen self-report metric grows monotonically over N iterations,
      and the workload stops cleanly on ctx cancel/timeout. Do NOT drive a real OOM in CI
      (would kill the container, flaky). Real OOM is reserved for manual stand demonstration
      via normal CLI run with large parameters. No separate guarded "real OOM" mode.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      US1 (primary): As a lead DBA, I want to start backend-killer on a training stand with one
      command, so I can show juniors how a single session leaking prepared statements drives the
      instance to OOM and restart, and walk through symptoms and fixes.
        Scenario: lead runs `noisia --backend-killer --conninfo=... [--backend-killer.plan-size=...]`
        against a small-RAM stand → panel ticks prepared-stmt count/rate/elapsed every interval →
        backend RSS climbs → OOM killer reaps the backend → postmaster restarts the instance →
        noisia's connection drops → noisia logs the climax line → lead explains symptoms (OOM in
        kernel log, PG restart in log, plan-cache growth) and remediation.
      US2: As an SRE/monitoring engineer, I want to reproduce backend-memory growth ending in an
      OOM restart on demand, so I can verify alerts fire (memory pressure, instance restart, plan
      cache growth).
        Scenario: SRE runs the workload against a test instance wired to monitoring → observes the
        alerts trigger as memory climbs and the instance restarts.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 85
    status: "complete"
    value: |
      - `--backend-killer` enables the workload; tuning flags --backend-killer.rate (0=unlimited),
        --backend-killer.plan-size (int, sane constant default), --backend-killer.show-memory (bool),
        --backend-killer.report-interval (default 1s) exist with defaults + envars.
      - Workload uses ONE dedicated connection (db.Connect), not a pool.
      - It issues unique PREPARE statements continuously; the in-process counter grows monotonically.
      - Plan heaviness scales with plan-size (target-list width); a sane default exists. (Auto plan-size
        and size-multiplier were dropped in validation round 1.)
      - rate throttles PREPAREs/sec when > 0; 0 means unlimited.
      - Escalation panel logs "backend-killer: prepared stmts=N rate=R/s elapsed=T" every
        report-interval via logger.Infof; no PG-server state polling. With --show-memory, appends an
        own-backend memory estimate (pg_backend_memory_contexts, PG14+; degrades gracefully below 14).
      - On connection loss (OOM) while ctx is still active, logs the climax line
        "connection lost after T, N statements issued — target likely OOM-restarted".
      - Run stops cleanly on ctx cancel/timeout (returns nil).
      - Conninfo never logged.
      - Integration test: counter grows monotonically over N iterations + clean ctx stop, no real OOM.
      - Config.validate() table-tested.
      - README updated (bullet list + impact table, impact = Yes).
    gaps: ""
    required: true

  edge_cases:
    score: 85
    status: "complete"
    value: |
      - Connect failure at start: return an init error (setup failure), distinct from a mid-run
        connection drop (which is success).
      - PREPARE error mid-run (a query error, not a connection drop): Warnf and continue (per-tick
        error idiom); should not happen by construction.
      - Big-RAM target: OOM may take long; raise --backend-killer.plan-size to speed it.
      - plan-size set very high: a single PREPARE may itself be heavy/slow — acceptable, document.
      - PREPARE name uniqueness across millions of statements: derive from a monotonic counter.
      - ctx cancelled before any OOM: just stop cleanly (the common CI case).
      - Non-OOM connection drop (network blip, external pg_terminate_backend): noisia cannot tell it
        apart from OOM, so the climax line says "likely" — conscious limitation.
      - Target restarts and comes back: noisia has already logged climax and run ends (no reconnect loop).
      - rate=0 (unlimited) must not busy-spin pathologically — follow rollbacks/tempfiles loop idiom.
      - show-memory on PG < 14: pg_backend_memory_contexts absent → degrade gracefully (skip the
        memory line / warn once), keep the counter.
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: |
      - Cannot connect at start → return err (setup failure), like other workloads.
      - PREPARE returns a query error (bad generated SQL) → must not happen by construction; if it
        does mid-run, Warnf and continue (per-tick error idiom).
      - Connection broken mid-run (the expected OOM climax): if ctx.Err()==nil, log the climax line
        and return nil (treat as success in a real run); do not error out.
      - Conninfo must never appear in any error/log message.
    gaps: ""
    required: true

  verification_strategy:
    score: 85
    status: "complete"
    value: |
      Agent: integration test under testcontainers (postgres:15-alpine via dbtest.RunMain) asserting
      monotonic counter growth over N iterations and clean ctx stop; TestConfig_validate table test.
      User: manual stand run against a small-RAM PostgreSQL, observe panel, OOM, instance restart,
      and the climax log line.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      CLI workload, no UI. Escalation panel to stdout via logger.Infof every
      --backend-killer.report-interval (default 1s):
        "backend-killer: prepared stmts=N rate=R/s elapsed=T"
      Climax line on own-connection loss:
        "connection lost after T, N statements issued — target likely OOM-restarted"
      No percent bar (limit is host-defined and unknown in self-report model).
      Optional hybrid memory line (flag --backend-killer.show-memory): appends an own-backend
      memory estimate via "SELECT sum(used_bytes) FROM pg_backend_memory_contexts" (PG14+) — this
      is OWN-backend, same session, not external monitoring; the PREPARE counter remains the
      crash-surviving primary. e.g. "backend-killer: prepared stmts=N rate=R/s elapsed=T backend mem≈X".
      Flags: --backend-killer (enable), --backend-killer.rate (PREPARE/s, 0=unlimited),
      --backend-killer.plan-size (int, plan heaviness = target-list width, with a sane constant
      default), --backend-killer.show-memory (bool), --backend-killer.report-interval (default 1s),
      each with .Default() and .Envar("NOISIA_..."). NOTE: auto plan-size (procfs/cgroup) and the
      size-multiplier flag were DROPPED in validation round 1 (overengineering — see notes).
    gaps: ""
    required: true

  risks:
    score: 85
    status: "complete"
    value: |
      - Destructive: can crash a real instance (impact=Yes). Mitigation: README disclaimer (existing
        project stance: no guardrails, user responsible) + impact table entry.
      - CI safety: never drive real OOM in tests (would kill container, flaky). Mitigation: tests prove
        mechanics only.
      - noisia's own client memory: prepared statements live server-side; client only holds a counter +
        statement names — client footprint stays small (verify no client-side leak).
      - Secret leakage: Conninfo must never be logged.
      - Client-side memory of noisia itself: prepared statements live server-side; the client keeps
        only a counter + names. Mitigation: do not accumulate per-statement data client-side (verify
        no client-side leak).
      - show-memory adds a periodic SELECT in the same session: negligible, but skip cleanly on PG<14.
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      - Variant B (incremental single-session growth) over A (one opaque blocking query) and C (many
        sessions): only B reconciles "one session → OOM" with a live escalation panel. Rejected A
        (no observable progress), C (not "one query/session").
      - Concrete mechanism = prepared-statement / plan-cache leak. Rejected held-cursors / growing
        allocations (spill to disk via tuplestore → impure RAM pressure, less predictable OOM).
      - Self-report only (prepared-stmt count + rate + elapsed). Rejected polling pg_backend_memory_contexts
        (even own-backend) — keeps the "no system-state polling" principle; report survives the crash.
      - Single dedicated db.Connect connection, NOT the pool (pool spreads PREPAREs across backends).
      - Single-threaded (no --jobs).
      - No pre-seeding (self-generated load over SELECT $1::int style statements).
      - Climax via detecting loss of noisia's own connection.
      - Mechanism reality (post devil's-advocate): prepared-stmt/plan-cache leak is a realistic but
        THEORETICAL trigger (author has not personally hit it); the broader RSS-growth->OOM class is
        well-known from experience. work_mem-style pressure was rejected because it typically causes
        disk spill + IO (already covered by tempfiles), not OOM. Mechanism kept.
      - Hybrid panel added (post devil's-advocate): optional own-backend memory line so the demo
        shows the EFFECT (RSS) not only the CAUSE (PREPARE count); counter stays crash-surviving primary.
      - Mechanism is a literal server-side PREPARE <unique> AS ... via conn.Exec (grows the server plan
        cache), NOT pgx-level prepared statements; heaviness = target-list width.
      - Auto plan-size REJECTED (validation round 1, adequacy): procfs/cgroup is brittle, platform-
        dependent, unreliable in containers, only a heuristic, only valid co-located; the manual
        --plan-size flag is enough. size-multiplier dropped with it (orphaned without auto).
      - Climax via own-connection loss; cannot distinguish OOM from other drops, hence "likely".
    gaps: ""
    required: false

# ============================================================================
# Phase 3: Integration & Technical Context
# ============================================================================
phase3_integration:

  integration_points:
    score: 90
    status: "complete"
    value: |
      New package backend-killer/ (single file <name>.go) following the canonical shape:
      Config{Conninfo,...} + value-receiver validate() + workload struct + NewWorkload (calls
      validate first) + Run(ctx). Single-threaded loop pattern like rollbacks/tempfiles:
      rate.NewLimiter + busy-poll Allow() + select ctx.Done(). MUST use db.Connect(ctx,conninfo)
      for ONE dedicated connection (NOT the pool — a pool would spread PREPAREs across backends
      and never OOM a single one). Exec via Conn.Exec. targeting/ NOT used (self-generated:
      unique PREPARE over e.g. SELECT $1::int). log.Logger.Infof for the periodic panel.
      CLI wiring = 5 spots across cmd/main.go + cmd/app.go (enable bool flag + tuning flags
      with .Default()/.Envar(); config literal; config struct fields; if-block goroutine under
      shared duration + WaitGroup; import + start helper). No --jobs. Tests: main_test.go
      (dbtest.RunMain) + <pkg>_test.go (TestConfig_validate table test + TestWorkload_Run),
      -p 1 serial. OOM => next Exec returns broken-conn error = SUCCESS in real run; guard log
      with ctx.Err()==nil (tempfiles idiom). BSD 3-line header in each .go.
    gaps: ""
    required: true

